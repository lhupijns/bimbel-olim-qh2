<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimbel Olimpiade Qur'an Hadis</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Amiri:wght@400;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f0f9ff] text-slate-800 antialiased min-h-screen flex flex-col font-nunito bg-pattern">

    <!-- Header Ceria -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b-4 border-blue-200">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500 text-white p-2 rounded-xl shadow-sm text-xl">🕌</div>
                <div>
                    <h1 class="text-xl font-bold text-blue-600 font-fredoka leading-tight">Qur'an Hadis</h1>
                    <p class="text-xs text-slate-500 font-bold">Pak Rozak • MIN 3 Nganjuk</p>
                </div>
            </div>
            <button id="btn-home" class="hidden bg-orange-100 text-orange-600 p-2 rounded-xl border-b-4 border-orange-200 active:border-b-0 active:translate-y-1 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-md mx-auto w-full p-4 relative">
        
        <!-- View: Dashboard -->
        <div id="view-dashboard" class="view-section active fade-in">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-3xl p-6 mb-6 shadow-lg border-b-4 border-blue-700 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-7xl opacity-20">✨</div>
                <h2 class="text-2xl font-bold mb-2 font-fredoka">Halo, Juara! 🌟</h2>
                <p class="text-sm opacity-90 font-semibold">Siap jadi bintang Olimpiade Qur'an Hadis Kelas 5? Yuk pilih materimu hari ini!</p>
            </div>

            <h3 class="font-bold text-lg mb-4 text-slate-700 flex items-center gap-2">
                <span>📚</span> Daftar Petualangan
            </h3>
            <div id="materi-list" class="space-y-4 pb-8">
                <!-- Daftar materi di-render oleh JS -->
            </div>
        </div>

        <!-- View: Detail Materi -->
        <div id="view-material" class="view-section hidden fade-in">
            <div class="bg-white rounded-3xl p-6 shadow-sm border-2 border-blue-100 border-b-4 mb-6 relative">
                <h2 id="mat-title" class="text-xl font-bold text-blue-600 font-fredoka mb-4"></h2>
                
                <div class="bg-blue-50 rounded-2xl p-5 mb-5 border-2 border-blue-100 relative">
                    <div class="absolute -top-3 -left-3 text-3xl">📖</div>
                    <p id="mat-arabic" class="arabic-text text-3xl text-right leading-[2.5rem] text-slate-800 mb-4" dir="rtl"></p>
                    <p id="mat-translation" class="text-sm font-semibold text-slate-600 bg-white p-3 rounded-xl border border-blue-100 italic"></p>
                </div>

                <div class="bg-yellow-50 rounded-2xl p-5 mb-6 border-2 border-yellow-100">
                    <h4 class="font-bold text-yellow-700 mb-2 flex items-center gap-2"><span>💡</span> Penjelasan</h4>
                    <div class="text-sm text-slate-700 font-semibold leading-relaxed" id="mat-desc"></div>
                </div>

                <button onclick="startQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-2xl shadow-sm border-b-4 border-green-700 active:border-b-0 active:translate-y-1 transition-all text-lg font-fredoka flex justify-center items-center gap-2">
                    Mulai Latihan Soal 🚀
                </button>
            </div>
        </div>

        <!-- View: Quiz -->
        <div id="view-quiz" class="view-section hidden fade-in">
            <div class="flex justify-between items-center mb-3 font-bold text-slate-600">
                <span id="quiz-progress-text" class="bg-white px-4 py-1.5 rounded-full border-2 border-blue-100 shadow-sm text-sm">Soal 1 / 15</span>
                <span class="bg-orange-100 text-orange-600 border-2 border-orange-200 px-3 py-1.5 rounded-full text-xs flex items-center gap-1">⭐ Fokus!</span>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full bg-white border-2 border-blue-100 rounded-full h-4 mb-6 shadow-inner p-0.5">
                <div id="quiz-progress-bar" class="bg-gradient-to-r from-blue-400 to-blue-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border-2 border-blue-100 mb-6">
                <p id="quiz-question" class="font-bold text-lg text-slate-800 mb-6 leading-relaxed"></p>
                <div id="quiz-options" class="space-y-3">
                    <!-- Opsi di-render oleh JS -->
                </div>

                <!-- Box Pembahasan (Muncul setelah jawab) -->
                <div id="quiz-explanation-box" class="hidden mt-6 bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-4 fade-in">
                    <div id="quiz-feedback-icon" class="text-4xl text-center mb-2 bounce"></div>
                    <div class="flex items-center gap-2 mb-2 font-bold text-yellow-800 text-lg">
                        Pembahasan:
                    </div>
                    <p id="quiz-explanation-text" class="text-yellow-900 text-sm font-semibold leading-relaxed"></p>
                </div>

                <!-- Tombol Lanjut (Muncul setelah jawab) -->
                <button id="btn-next-question" onclick="nextQuestion()" class="hidden w-full mt-5 bg-blue-500 hover:bg-blue-600 text-white font-bold font-fredoka text-lg py-4 px-4 rounded-2xl border-b-4 border-blue-700 active:border-b-0 active:translate-y-1 transition-all">
                    Lanjut Soal Berikutnya 👉
                </button>
            </div>
        </div>

        <!-- View: Hasil Akhir -->
        <div id="view-result" class="view-section hidden fade-in">
            <div class="bg-white rounded-3xl p-8 shadow-sm border-2 border-blue-100 text-center mb-6">
                <div class="text-6xl mb-4 bounce" id="result-emoji">🎉</div>
                <h2 id="result-greeting" class="text-2xl font-bold text-slate-800 mb-2 font-fredoka">Latihan Selesai!</h2>
                
                <div class="bg-blue-50 rounded-2xl p-6 my-6 border-2 border-blue-100">
                    <p class="text-slate-500 font-bold mb-2">Skor Kamu:</p>
                    <div class="text-7xl font-black text-blue-600 mb-2 font-fredoka" id="result-score">100</div>
                    <p class="text-sm font-bold text-blue-500" id="result-stats">Benar 15 dari 15 soal</p>
                </div>
                
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] hover:bg-[#1ebe5d] text-white font-bold font-fredoka text-lg py-4 px-4 rounded-2xl shadow-sm border-b-4 border-[#168c43] active:border-b-0 active:translate-y-1 transition-all mb-4 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    Lapor ke Pak Rozak
                </button>
                <button onclick="goHome()" class="w-full bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-600 font-bold font-fredoka text-lg py-4 px-4 rounded-2xl active:translate-y-1 transition-all">
                    Kembali ke Beranda
                </button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
